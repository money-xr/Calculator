<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>

    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="label-strip">ARITHMETIC ENGINE</div>

    <div class="calc-shell">
        <div class="screw-br"></div>
        <div class="screw-bl"></div>

        <div class="display-wrap">
            <div class="display-expr" id="expr"></div>
            <div class="display-main" id="display">0</div>
        </div>

        <div class="btn-grid">
            <button class="btn-clear" data-action="clear" id="btnC">AC</button>
            <button class="btn-back" data-action="back" id="btnB">&#x232B;</button>
            <button class="btn-op" data-action="op" data-val="%" id="btnPct">%</button>
            <button class="btn-op" data-action="op" data-val="/" id="btnDiv">&#247;</button>

            <button class="btn-num" data-action="digit" data-val="7">7</button>
            <button class="btn-num" data-action="digit" data-val="8">8</button>
            <button class="btn-num" data-action="digit" data-val="9">9</button>
            <button class="btn-op" data-action="op" data-val="*" id="btnMul">&#215;</button>

            <button class="btn-num" data-action="digit" data-val="4">4</button>
            <button class="btn-num" data-action="digit" data-val="5">5</button>
            <button class="btn-num" data-action="digit" data-val="6">6</button>
            <button class="btn-op" data-action="op" data-val="-" id="btnSub">&#8722;</button>

            <button class="btn-num" data-action="digit" data-val="1">1</button>
            <button class="btn-num" data-action="digit" data-val="2">2</button>
            <button class="btn-num" data-action="digit" data-val="3">3</button>
            <button class="btn-op" data-action="op" data-val="+" id="btnAdd">+</button>

            <button class="btn-num btn-zero" data-action="digit" data-val="0">0</button>
            <button class="btn-num" data-action="dot">.</button>
            <button class="btn-eq" data-action="equals" id="btnEq">=</button>
        </div>
    </div>

    <div class="footer">keyboard supported · esc to clear</div>

    <script src="script.js"></script>

</body>

</html>
